<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruto</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    background:orange;
    color:#111;
    text-align:center;
    padding:25px;
}

section{
    max-width:800px;
    margin:30px auto;
    padding:20px;
    text-align:center;
}

img{
    width:250px;
    border-radius:15px;
    margin:20px 0;
}

button{
    background:orange;
    border:none;
    padding:12px 20px;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#ffb300;
}

footer{
    text-align:center;
    padding:20px;
    background:#222;
    margin-top:30px;
}
</style>

</head>
<body>

<header>
    <h1>🍥 Naruto Uzumaki 🍥</h1>
</header>

<section>

<img src="https://upload.wikimedia.org/wikipedia/en/9/94/NarutoCoverTankobon1.jpg" alt="Naruto">

<h2>Quem é Naruto?</h2>

<p>
Naruto Uzumaki é um jovem ninja da Vila da Folha.
Seu sonho é se tornar Hokage e proteger seus amigos.
</p>

<br>

<button onclick="mensagem()">
Clique aqui
</button>

</section>

<footer>
Feito por você no VS Code ⚡
</footer>

<script>
function mensagem(){
    alert("Dattebayo! Eu nunca volto atrás na minha palavra!");
}
</script>

</body>
</html>
